name: "Workflow SHAs"
description: "Track and enforce GitHub Actions SHA pinning across a GitHub organization."
branding:
  icon: shield
  color: blue

inputs:
  command:
    description: "Subcommand to run: check, pin, or enforce."
    required: true
  org:
    description: "GitHub organization to operate on."
    required: true
  tracking-repo:
    description: "Repo name for the tracking issue (required for 'check' command)."
    required: false
    default: ""
  repos:
    description: "Comma-separated list of specific repos to process (optional)."
    required: false
    default: ""
  dry-run:
    description: "Run in dry-run mode (no mutations)."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

    - name: Run workflow-shas
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        args="--org ${{ inputs.org }} ${{ inputs.command }}"

        # Command-specific args
        if [ "${{ inputs.command }}" = "check" ]; then
          if [ -z "${{ inputs.tracking-repo }}" ]; then
            echo "::error::tracking-repo input is required for the check command"
            exit 1
          fi
          args="$args --tracking-repo ${{ inputs.tracking-repo }}"
        fi

        # Repo filter
        if [ -n "${{ inputs.repos }}" ]; then
          IFS=',' read -ra REPOS <<< "${{ inputs.repos }}"
          for repo in "${REPOS[@]}"; do
            repo=$(echo "$repo" | xargs)  # trim whitespace
            if [ -n "$repo" ]; then
              args="$args --repo $repo"
            fi
          done
        fi

        # Dry run
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          args="$args --dry-run"
        fi

        uv run workflow-shas $args
